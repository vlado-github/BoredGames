name: BoredGames Portal

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3

      - name: Install dependencies
        uses: bahmutov/npm-install@v1
        with:
          working-directory: BoredGames.Client/BoredGames.Portal

      - name: Build with npm
        run: npm run build 
        working-directory: BoredGames.Client/BoredGames.Portal

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v3
        with:
          name: boredgames-portal
          path: ./boredgames-portal
          
  deploy:
      permissions:
        contents: none
      runs-on: ubuntu-latest
      needs: build
      environment:
        name: 'Production'

      steps:
        - name: Download artifact from build job
          uses: actions/download-artifact@v3
          with:
            name: boredgames-portal
            path: ./boredgames-portal
            
        - name: Deploy to Vultr
          uses: appleboy/scp-action@v0.1.7
          with:
            host: ${{ secrets.HOST }}
            username: ${{ secrets.USERNAME }}
            port: ${{ secrets.PORT }}
            source: boredgames-portal/*
            target: /home/boredgames/release/v0.0.1
            key: ${{ secrets.SSH_KEY }}


