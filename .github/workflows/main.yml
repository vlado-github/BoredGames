name: Build and deploy BoredGames backend API

env:
  DOTNET_VERSION: '7'                 # set this to the .NET Core version to use

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install dependencies
        run: dotnet restore --project BoredGames.Server.API 

      - name: Build with dotnet
        run: dotnet build --project BoredGames.Server.API --configuration Release

      - name: dotnet publish
        run: dotnet publish --project BoredGames.Server.API -c Release -o ../boredgames-api

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v3
        with:
          name: boredgames-api
          path: ../boredgames-api
          
  deploy:
      permissions:
        contents: none
      runs-on: ubuntu-latest
      needs: build
      environment:
        name: 'Production'

      steps:
        - name: Download artifact from build job
          uses: actions/download-artifact@v3
          with:
            name: boredgames-api
  
        - name: Deploy to Vultr
          id: deploy-webapi
          uses: techknowlogick/action-vultr@v2
          with:
            token: ${{ secrets.VULTR_API_KEY }}

