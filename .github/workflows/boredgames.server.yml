name: BoredGames API

env:
  DOTNET_VERSION: '8'                 # set this to the .NET Core version to use

on:
  #push:
    #branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install dependencies
        run: dotnet restore ./BoredGames.Server/BoredGames.Server.sln

      - name: Build with dotnet
        run: dotnet build ./BoredGames.Server/BoredGames.Server.sln --configuration Release

      - name: dotnet publish
        run: dotnet publish ./BoredGames.Server/BoredGames.Server.sln -c Release -o ./boredgames-api

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: boredgames-api
          path: ./boredgames-api
          
  deploy:
      permissions:
        contents: none
      runs-on: ubuntu-latest
      needs: build
      environment:
        name: 'Production'

      steps:
        - name: Download artifact from build job
          uses: actions/download-artifact@v4
          with:
            name: boredgames-api
            path: ./boredgames-api
            
        - name: Deploy to Vultr
          uses: appleboy/scp-action@v0.1.7
          with:
            host: ${{ secrets.HOST }}
            username: ${{ secrets.USERNAME }}
            port: ${{ secrets.PORT }}
            source: boredgames-api/*
            target: /home/boredgames/release
            key: ${{ secrets.SSH_KEY }}
        
        - name: Restart server process
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.HOST }}
            username: ${{ secrets.USERNAME }}
            port: ${{ secrets.PORT }}
            key: ${{ secrets.SSH_KEY }}
            script: supervisorctl restart boredgames-api


