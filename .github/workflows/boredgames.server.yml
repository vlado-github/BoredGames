name: BoredGames Backend

env:
  DOTNET_VERSION: '8'                 # set this to the .NET Core version to use

on:
  #push:
    #branches: [ "main" ]
  workflow_dispatch:

permissions:
  checks: write
  contents: read

jobs:
  build:
    runs-on: self-hosted
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Solution (BoredGames.API)
        run: |
          sudo docker build -f BoredGames.Server/BoredGames.API/Dockerfile -t boredgames-api

      - name: Build Solution (BoredGames.GameServer)
        run: |
          sudo docker build -f BoredGames.Server/BoredGames.Server.GameServer -t boredgames-gameserver
          
  deploy:
    runs-on: self-hosted
    needs: build
    environment:
      name: 'Production'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Deploy API
        run: |
          sudo docker-compose up -d --force-recreate 




