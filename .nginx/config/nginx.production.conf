worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;

    # --- Enable Brotli + Gzip Static ---
    brotli on;
    brotli_static on;
    brotli_comp_level 6;
    brotli_types
        text/plain text/css text/javascript application/javascript
        application/x-javascript application/json application/xml
        application/xml+rss image/svg+xml application/wasm;
    brotli_min_length 256;

    gzip on;
    gzip_static on;
    gzip_types
        text/plain text/css application/javascript application/json
        application/xml application/xml+rss text/javascript image/svg+xml
        application/wasm;
    gzip_min_length 256;

    # --- HTTP → HTTPS redirect ---
    server {
        listen 80;
        listen [::]:80;
        server_name boredgames.lol www.boredgames.lol;

        location /.well-known {
            root /home/boredgames/letsencrypt;
            allow all;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS Server ---
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name boredgames.lol www.boredgames.lol;

        ssl_certificate /etc/letsencrypt/live/boredgames.lol/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/boredgames.lol/privkey.pem;

        error_log /var/log/nginx/boredgames.lol.error.log;

        root /home/boredgames/release/boredgames-portal;
        index index.html;

        # --- Unity Brotli file handling ---
        location ~* \.wasm\.br$ {
            gzip off;
            add_header Content-Encoding br;
            add_header Cache-Control "public, max-age=31536000, immutable";
            default_type application/wasm;
            root /home/boredgames/release/boredgames-portal;
        }

        location ~* \.js\.br$ {
            gzip off;
            add_header Content-Encoding br;
            add_header Cache-Control "public, max-age=31536000, immutable";
            default_type application/javascript;
            root /home/boredgames/release/boredgames-portal;
        }

        location ~* \.data\.br$ {
            gzip off;
            add_header Content-Encoding br;
            add_header Cache-Control "public, max-age=31536000, immutable";
            default_type application/octet-stream;
            root /home/boredgames/release/boredgames-portal;
        }

        location ~* \.br$ {
            gzip off;
            add_header Content-Encoding br;
            add_header Cache-Control "public, max-age=31536000, immutable";
            default_type application/octet-stream;
            root /home/boredgames/release/boredgames-portal;
        }

        # --- Main Web App / SPA handler ---
        location / {
            try_files $uri $uri/ /index.html;
        }

        # --- Let’s Encrypt renewal ---
        location /.well-known/acme-challenge {
            root /home/boredgames/letsencrypt;
            allow all;
        }

        # --- API reverse proxy ---
        location /api {
            proxy_pass http://boredgames_api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
            add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept';

            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
                add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept';
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                return 204;
            }
        }
    }
}
