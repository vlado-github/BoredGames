http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;

    gzip on;                  # enable gzip
    gzip_types application/javascript application/wasm application/octet-stream;
    gzip_min_length 256;

    # --- HTTP → HTTPS redirect ---
    server {
        listen 80;
        listen [::]:80;
        server_name boredgames.lol www.boredgames.lol;

        location /.well-known {
            root /home/boredgames/letsencrypt;
            allow all;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS Server ---
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name boredgames.lol www.boredgames.lol;

        ssl_certificate /etc/letsencrypt/live/boredgames.lol/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/boredgames.lol/privkey.pem;

        error_log /var/log/nginx/boredgames.lol.error.log;

        root /home/boredgames/release/boredgames-portal;
        index index.html;

        # --- Unity WebGL handling ---

        # Data files (.data) → NOT precompressed, gzip on-the-fly
        location ~* \.data$ {
            gzip on;
            gzip_static off;       # do NOT serve .gz file
            gzip_types application/octet-stream;
            default_type application/octet-stream;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # WebAssembly (.wasm.gz) → precompressed allowed
        location ~* \.wasm\.gz$ {
            gzip off;
            add_header Content-Encoding gzip always;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            default_type application/wasm;
        }

        # JavaScript (.js.gz) → precompressed allowed
        location ~* \.js\.gz$ {
            gzip off;
            add_header Content-Encoding gzip always;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            default_type application/javascript;
        }

        # SPA / index.html fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Let’s Encrypt
        location /.well-known/acme-challenge {
            root /home/boredgames/letsencrypt;
            allow all;
        }

        # API reverse proxy
        location /api {
            proxy_pass http://boredgames_api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
            add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept';

            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
                add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept';
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                return 204;
            }
        }
    }
}
