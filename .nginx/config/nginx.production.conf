worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    gzip_static on;

    # -----------------------------
    # HTTP → HTTPS redirect
    # -----------------------------
    server {
        listen 80;
        listen [::]:80;

        server_name boredgames.lol www.boredgames.lol;

        # ACME challenge (Certbot)
        location /.well-known/acme-challenge/ {
            root /home/boredgames/letsencrypt;
            allow all;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -----------------------------
    # MAIN HTTPS SERVER
    # -----------------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;

        server_name boredgames.lol www.boredgames.lol;

        # SSL Certificates (Certbot)
        ssl_certificate     /etc/letsencrypt/live/boredgames.lol/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/boredgames.lol/privkey.pem;
        ssl_session_cache shared:SSL:20m;
        ssl_session_timeout 10m;

        error_log /var/log/nginx/boredgames.lol.error.log;

        # =============================
        # ROOT: SPA + Unity WebGL build
        # =============================
        root /home/boredgames/release/boredgames-portal;
        index index.html;

        # -----------------------------
        # Unity WebGL: precompressed .data.gz
        # -----------------------------
        location ~* \.data\.gz$ {
            types { }
            default_type application/octet-stream;
            add_header Content-Encoding gzip always;
            add_header Cache-Control "public, max-age=86400, immutable" always;
        }

        # Unity WebGL: precompressed .wasm.gz
        location ~* \.wasm\.gz$ {
            types { }
            default_type application/wasm;
            add_header Content-Encoding gzip always;
            add_header Cache-Control "public, max-age=86400, immutable" always;
        }

        # Unity WebGL: precompressed .js.gz
        location ~* \.js\.gz$ {
            types { }
            default_type application/javascript;
            add_header Content-Encoding gzip always;
            add_header Cache-Control "public, max-age=86400, immutable" always;
        }

        # -----------------------------
        # ACME Challenge for Certbot
        # -----------------------------
        location /.well-known/acme-challenge/ {
            root /home/boredgames/letsencrypt;
            allow all;
        }

        # -----------------------------
        # SignalR WebSockets /hubs
        # -----------------------------
        location /hubs/ {
            proxy_pass http://boredgames_api:8080/hubs/;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -----------------------------
        # API reverse proxy
        # -----------------------------
        location /api/ {
            proxy_pass http://boredgames_api:8080;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS (if needed)
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE" always;
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE";
                add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
        }

        # -----------------------------
        # SPA Fallback (must be last)
        # -----------------------------
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
